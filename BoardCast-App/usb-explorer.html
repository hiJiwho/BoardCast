<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>USB Explorer</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent: #00bda5;
            --text-main: #ffffff;
            --text-sub: #888888;
            --border: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-container {
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 1.5vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2vh 5vh rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }

        .header {
            padding: 2.5vh 1.5vw;
            background: #1a1a1a;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag;
        }

        .header h2 {
            margin: 0;
            font-size: 2.2vh;
            color: var(--accent);
            font-weight: 800;
        }

        .close-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 3vh;
            cursor: pointer;
            -webkit-app-region: no-drag;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ff4d4d;
        }

        .breadcrumb-bar {
            padding: 1.5vh 1.5vw;
            background: #151515;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1vw;
            font-size: 1.4vh;
            color: #666;
        }

        .file-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5vh 1vw;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1vh;
            align-content: start;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5vh;
            border-radius: 1vw;
            cursor: pointer;
            transition: all 0.2s;
            gap: 1vh;
            border: 1px solid transparent;
        }

        .item:hover {
            background: rgba(46, 204, 113, 0.05);
            border-color: rgba(46, 204, 113, 0.2);
            transform: translateY(-2px);
        }

        .item svg {
            width: 4.5vh;
            height: 4.5vh;
            fill: var(--accent);
        }

        .item.back svg {
            fill: #8e44ad; /* Purple for Back button */
        }

        .item span {
            font-size: 1.3vh;
            word-break: break-all;
            color: #eee;
            font-weight: 500;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .footer {
            padding: 1.5vh 1.5vw;
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .system-explorer-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: #aaa;
            padding: 0.8vh 1.2vw;
            border-radius: 0.8vh;
            font-size: 1.3vh;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .system-explorer-btn:hover {
            background: #333;
            color: #fff;
            border-color: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>
    <div class="window-container">
        <div class="header">
            <h2 id="window-title">USB 파일 탐색기</h2>
            <button class="close-btn" onclick="window.close()">×</button>
        </div>
        <div class="breadcrumb-bar" id="path-display">
            로딩 중...
        </div>
        <div class="file-list" id="file-list">
            <!-- Files injected here -->
        </div>
        <div class="footer">
            <button class="system-explorer-btn" id="open-system-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                진짜 파일 탐색기 열기
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let currentPath = params.get('drive');
        if (currentPath && !currentPath.endsWith('\\')) currentPath += '\\';
        
        const rootDrive = currentPath;

        async function loadFiles(dirPath) {
            currentPath = dirPath;
            document.getElementById('path-display').innerText = currentPath;
            
            const listCont = document.getElementById('file-list');
            listCont.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:5vh; color:#555;">...</div>';

            const files = await window.api.getUSBFiles(dirPath);
            listCont.innerHTML = '';

            // 1. Back Button (이전 경로)
            if (currentPath !== rootDrive) {
                const backItem = document.createElement('div');
                backItem.className = 'item back';
                backItem.onclick = () => {
                    const parts = currentPath.split('\\').filter(Boolean);
                    parts.pop();
                    let parent = parts.join('\\');
                    if (parent) parent += '\\';
                    loadFiles(parent || rootDrive);
                };
                backItem.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    <span>이전 경로</span>
                `;
                listCont.appendChild(backItem);
            }

            // 2. Folder List
            const folders = files.filter(f => f.isDirectory).sort((a,b) => a.name.localeCompare(b.name));
            folders.forEach(f => {
                const item = document.createElement('div');
                item.className = 'item';
                item.onclick = () => loadFiles(f.path + '\\');
                item.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                    <span>${f.name}</span>
                `;
                listCont.appendChild(item);
            });

            // 3. File List
            const regularFiles = files.filter(f => !f.isDirectory).sort((a,b) => a.name.localeCompare(b.name));
            regularFiles.forEach(f => {
                const item = document.createElement('div');
                item.className = 'item';
                item.onclick = () => window.api.openUSBFile(f.path);
                item.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM13 9V3.5L18.5 9H13z"/></svg>
                    <span>${f.name}</span>
                `;
                listCont.appendChild(item);
            });
        }

        document.getElementById('open-system-btn').onclick = () => {
            window.api.controlExplorer('start');
            window.api.openUSBFile(currentPath);
        };

        if (currentPath) loadFiles(currentPath);
    </script>
</body>
</html>
